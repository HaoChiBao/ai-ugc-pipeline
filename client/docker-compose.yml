# Local Postgres for development. From this directory:
#   docker compose up -d
# Connection: postgresql://postgres:postgres@localhost:5432/ai_ugc
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ugc
    volumes:
      - ai_ugc_pgdata:/var/lib/postgresql/data

volumes:
  ai_ugc_pgdata:
